name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Build desktop assets
        run: ./scripts/build-desktop-assets.sh

      - name: Run tests
        run: npm test

      - name: Upload desktop asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: neptune-inspector-h5-dist
          path: dist/
          if-no-files-found: error
