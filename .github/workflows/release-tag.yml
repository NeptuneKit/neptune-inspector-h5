name: Release (Tag)

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v1.2.3 or 2026.3.26). Leave empty when dispatching from a tag ref."
        required: false
        default: ""
        type: string
      draft:
        description: "Create release as draft"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${{ inputs.tag_name }}"
          if [[ -z "${tag_name}" ]]; then
            tag_name="${GITHUB_REF_NAME}"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${GITHUB_REF_TYPE:-}" != "tag" && -z "${{ inputs.tag_name }}" ]]; then
            echo "workflow_dispatch from a branch requires inputs.tag_name" >&2
            exit 1
          fi

          if [[ ! "${tag_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] && [[ ! "${tag_name}" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}(\.[0-9]+)?$ ]]; then
            echo "invalid tag: ${tag_name}" >&2
            exit 1
          fi

          printf 'tag_name=%s\n' "${tag_name}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release_tag.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build desktop dist assets
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build-desktop-assets.sh

      - name: Package dist zip
        id: dist_zip
        shell: bash
        run: |
          set -euo pipefail
          tag_name="${{ steps.release_tag.outputs.tag_name }}"
          mkdir -p dist/release
          archive_name="neptune-inspector-h5-dist-${tag_name}.zip"
          # Keep the top-level dist/ directory in archive so desktop resolver can
          # locate dist/index.html after unzip.
          /usr/bin/zip -r "dist/release/${archive_name}" dist
          /usr/bin/shasum -a 256 "dist/release/${archive_name}" > "dist/release/${archive_name}.sha256"
          printf 'archive_name=%s\n' "${archive_name}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag_name }}
          files: |
            dist/release/${{ steps.dist_zip.outputs.archive_name }}
            dist/release/${{ steps.dist_zip.outputs.archive_name }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: ${{ inputs.draft || false }}
          prerelease: ${{ inputs.prerelease || false }}
